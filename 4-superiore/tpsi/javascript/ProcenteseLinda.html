			<script>
				let moved=false;//variabile per la funzione moveBox
				// Funzione per calcolare la somma
				function calcolasum(){
					const n1=document.getElementById("num1");
					const n2=document.getElementById("num2");
					const ris=document.getElementById("risultato");
			
					const valore1=parseFloat(n1.value)||0;
					const valore2=parseFloat(n2.value)||0;
					const somma=valore1+valore2;
					risultato.textContent=somma;
					
				}
				//funzione per resettare il risultato nella pagina
				function reset(){
					const risElemento = document.getElementById("risultato");
					risElemento.textContent="";
					const div=document.getElementById("myDiv");
					div.style.backgroundColor = "white";
				
				}
				//funzione per far muovere il quadrato rosso a sinistra nella pagina
				function moveBox(){
					const box=document.getElementById("box");
						
					if(!moved){
						box.style.left="200px";
					}
					else{
						box.style.left="0px";
					}
					moved=!moved;
				}
				//funzione che controlla se ilrisultato è pari o dispari
				function check(){
					const risElemento = document.getElementById("risultato");//Queste due righe servono a "recuperare" il numero che è apparso nella pagina dopo il calcolo, in modo che JavaScript possa usarlo per decidere il colore o mostrare l'alert.
					const valore = parseInt(risElemento.textContent);//Questa riga serve a estrarre il numero e trasformarlo in un dato matematico.
					const div=document.getElementById("myDiv");
					
					if (valore % 2 === 0) {//(=== chiamato uguaglianza stretta) serve a confrontare due valori in modo più sicuro rispetto al == (uguaglianza semplice)
						div.style.backgroundColor = "red";
						alert("pari");
						document.body.innerHTML += "<p>il valore è: pari </p>";
					} else {
						div.style.backgroundColor = "green";
						alert("dispari");
						document.body.innerHTML += "<p>il valore è: dispari </p>";
					}
				}
			
			</script>
		</head>
		<body>
			<h2>Somma di due numeri</h2><br>
			<tr>
				<td><input type="number" id="num1" placeholder="primo numero" name="num1"> +</input></td>
				<td><input type="number" id="num2" placeholder="secondo numero" name="num2"></td>
				<td><input type="button" value="Calcola Somma" onclick="calcolasum();"></td>
			</tr><br><br>
				<div id="myDiv"> Risultato: <span id="risultato">0</span></div><br>
			
			<tr>
				<td><input type="button" value="Reset"  onClick="reset();"></td>
			</tr><br><br>
			
			<tr>
			<label for="azione1"><h2>Il quadrato può diventare un cerchio! Prova</h2></label><br>
				<div id="circle">
					<div class="box" id="box"></div>
				</div>
				
				<label for="azione1"><h3>Se il risultato è pari clicca su muovi:</h3></label><br>
				<input type="button" value="Muovi" onclick="moveBox();">
			</tr><br><br>
			
			<tr>
				<label for="azione1"><h3>Se invece è dispari clicca sul tasto Mostra qui sotto:<br> Se il risultato è davvero dispari allora diventerà verde sennò rosso</h3></label><br>
				<td><input type="button" value="Mostra" onclick="check();"></td>
				<h4>Cronologia alert:</h4>
			</tr>
		</body>
