<!DOCTYPE html>
<html>
	<head>
	<title>TEXT AREA</title>
		<style>
			#output{
				width: 300px;
				height: 200px;
				border: 2px solid pink;
			}
		</style>
		<script>
		function scrivi(){
			document.getElementById("output").innerHTML= description.value;
		}//creiamo la funzione scrivi (dobbiamo portare tramite il pulsante clicca quello che l'utente ha scritto nella barra, all'interno della div col bordo rosa sottostante al pulsante clicca)
		</script>
	</head>
	<body>
		<form name="Moduli">
			<label>Lascia un commento:</label><!--tag label crea un etichetta -->
			<input type="text" id="description" name="description" maxlength="200"></input><!--creiamo una funzione chiamata description, ha come massima lunghezza "200"-->
			</br></br></br>
			<input type="button" value="clicca" onclick="scrivi();"></input></br></br><!--con onclick= scriviamo il nome della funzone, con value=scriviamo un nome sul pulsante-->
			<div id="output"></div>
		
		</form>
	</body>
</html>
