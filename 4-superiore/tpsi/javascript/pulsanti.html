<!--	1)creiamo una text area dove inseriamo un messaggio
	2)creiamo una text area dove inseriamo il colore da attribuire al testo
	3)creiamo una div di (width:400px, height:300px border: 1px solid black)
	4)creiamo un pulsante che copi il messaggio scritto all'interno della div
	
	5)creiamo un pulsante che schiacciandolo colora il testo della div del colore inserito
	6)aumenta la dimensione dei aratteri della frase
	7)diminuisce la dimensione dei aratteri della frase
	8)creiamo un pulsante che schiacciandolo aumenta la width della div
	9)creiamo un pulsante che schiacciandolo diminuisce la width della div-
	
	-->

<!DOCTYPE html>
<html>
	<head><title>Esercizio sui pulsanti</title><!--3)creiamo una div di (width:400px, height:300px border: 1px solid black)-->
		<style>
			#output{
				width: 400px;
				height: 300px;
				border: 3px solid pink;
			}
		</style>
		<script>
			var dimCarattere=15;//inizializata a valore globale
			dimDiv=400;
			function scrivi(){
				document.getElementById("output").innerHTML=messaggio.value;
			}
			function cambiaColore(){
				//var msg=document.getElementById("messaggio").value;
				var color=document.getElementById("colore").value;
				//document.getElementById("output").innerHTML=msg;//innerHTML= funscione che scrive dentro alla variabile msg in questo caso
				document.getElementById("output").style.color=color;//ora l'ultima riga di codice colora il testo
			}
			//abbiamo tolto la prima e la terza riga perche sennò quando cliccavamo il pulsante cambia colore stampava anche il testo senza premere inserisci testo
			function allargaCarattere(){
				dimCarattere++;//inizializata a valore globale / questa riga permette di diminuire la grandezza del testo
				document.getElementById("output").style.fontSize=dimCarattere + "px";//px è l'unità di misura / il + concatena la variabile alla sua unità di misura
			}	
			function stringiCarattere(){
				dimCarattere--;//questa riga permette di diminuire la grandezza del testo
				document.getElementById("output").style.fontSize=dimCarattere + "px";
			}
			function allargaDiv(){
				dimDiv+=5;
				document.getElementById("output").style.width=dimDiv + "px";//width= permette di modificare la width delle div
			}
			function stringiDiv(){
				dimDiv-=5;
				document.getElementById("output").style.width=dimDiv + "px";
			}
			
		</script>
	</head>
	<body>
		<form id="textAreasButton">
				<label>Scrivi un messaggio: </label>
				<input type="text" id="messaggio" name="messaggio" maxlength="200"></input></br></br><!--1)creiamo una text area dove inseriamo un messaggio-->
				<label>Inserisci un colore: </label>
				<input type="text" id="colore" name="colore" maxlength="200"></input></br></br></br><!--2)creiamo una text area dove inseriamo il colore da attribuire al testo-->
				<input type="button" value="ricopia testo" onclick="scrivi();"></input></br></br><!--4)creiamo un pulsante che copi il messaggio scritto all'interno della div-->
				<input type="button" value="cambia colore testo" onclick="cambiaColore();"></input><!--5)creiamo un pulsante che schiacciandolo colora il testo della div del colore inserito-->
				<input type="button" value="aumenta carattere" onclick="allargaCarattere();"></input><!--6)aumenta la dimensione dei aratteri della frase-->
				<input type="button" value="diminuisce carattere" onclick="stringiCarattere();"></input></br></br><!--7)diminuisce la dimensione dei aratteri della frase-->
				<input type="button" value="allarga box" onclick="allargaDiv();"></input><!--8)creiamo un pulsante che schiacciandolo aumenta la width della div-->
				<input type="button" value="stringi box" onclick="stringiDiv();"></input><!--9)creiamo un pulsante che schiacciandolo diminuisce la width della div-->
				
				
				<div id="output"></div>
		</form>
	</body>
</html><!---->
