<!DOCTYPE html>
	<html>
		<head><title>SOMMATORIA</title>
			<script>
				function calcolasum(){
					//salva i numeri inseriti in due costanti
					//const=varibili globali
					const input1=document.getElementById("num1");
					const input2=document.getElementById("num2");
					//risultato poi deve essere inserito nella div una volta calcolato
					const risultato=document.getElementById("risultato");
					//l'evento è il click(puo essere onmouse =mose sopra al bottne eccetera
				
				
					//ci assicuriamo che i valori vengano visti come numeri;
					const valore1=parseFloat(input1.value)||0;//in caso non venisse inserito un valore in uno dei due numeri, inserisce automaticamente 0
					const valore2=parseFloat(input2.value)||0;
					//calcoliamo la somma
					const somma=valore1+valore2;
					//mettiamo la somma nel risultato
					risultato.textContent=somma;//contextContent riusciamo a scrivere dentro la div
					
				}
				
				function calcolasot(){
					//salva i numeri inseriti in due costanti
					//const=varibili globali
					const input1=document.getElementById("num1");
					const input2=document.getElementById("num2");
					//risultato poi deve essere inserito nella div una volta calcolato
					const risultato=document.getElementById("risultato");
					//l'evento è il click(puo essere onmouse =mose sopra al bottne eccetera
				
				
					//ci assicuriamo che i valori vengano visti come numeri;
					const valore1=parseFloat(input1.value)||0;//in caso non venisse inserito un valore in uno dei due numeri, inserisce automaticamente 0
					const valore2=parseFloat(input2.value)||0;
					//calcoliamo la somma
					const somma=valore1-valore2;
					//mettiamo la somma nel risultato
					risultato.textContent=somma;//contextContent riusciamo a scrivere dentro la div
					
				}
				
				
				
			</script>
		</head>
		<body>
			<h2>Somma di due numeri</h2><br/>
			<input type="number" id="num1" placeholder="primo numero" name="num1"> +</input>
			<input type="number" id="num2" placeholder="secondo numero" name="num2"></input><br/><br/>
			<input type="button" value="Calcola Somma" onclick="calcolasum();"><br/><br/>
			<p>Risultato: <span id="risultato">0</span></p>
			
			<h2>Sottrazione di due numeri</h2><br/>
			<input type="number" id="num1" placeholder="primo numero" name="num1"> -</input>
			<input type="number" id="num2" placeholder="secondo numero" name="num2"></input><br/><br/>
			<input type="button" value="Calcola Sottrazione" onclick="calcolasot();"><br/><br/>
			<p>Risultato: <span id="risultato">0</span></p>
		</body>
	</html>
