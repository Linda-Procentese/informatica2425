<!--inserire due numeri all'interno di due input type ed eseguire la somma;
prevedere un ulteriore pulsante tale che a seconda che la somma risulti essere pari o dispari verrà colorato lo sfondo della div, in cui visualizzeremo il risultato, in due colori diversi;
in un alert invece verrà comunicato se il valore è pari o dispari-->
<!DOCTYPE html>
	<html>
		<head><title>Compito vacanze</title>
			<style>
				#myDiv{
					width:90px;
					height:20px;
					padding: 3px;
					border: 1px solid #000;
				}
			</style>
			<script>
			  // Funzione per calcolare la somma
				function calcolasum(){
					const n1=document.getElementById("num1");
					const n2=document.getElementById("num2");
					const ris=document.getElementById("risultato");
			
					const valore1=parseFloat(n1.value)||0;
					const valore2=parseFloat(n2.value)||0;
					const somma=valore1+valore2;
					risultato.textContent=somma;
					
				}
				function check(){
					const risElemento = document.getElementById("risultato");//Queste due righe servono a "recuperare" il numero che è apparso nella pagina dopo il calcolo, in modo che JavaScript possa usarlo per decidere il colore o mostrare l'alert.
					const valore = parseInt(risElemento.textContent);//Questa riga serve a estrarre il numero e trasformarlo in un dato matematico.
					const div=document.getElementById("myDiv");
					
					if (valore % 2 === 0) {//(=== chiamato uguaglianza stretta) serve a confrontare due valori in modo più sicuro rispetto al == (uguaglianza semplice)
						div.style.backgroundColor = "pink";
					} else {
						div.style.backgroundColor = "red";
					}
				}
				
				function mostraAllert(){
					const risElemento = document.getElementById("risultato");
					const valore = parseInt(risElemento.textContent);
					if(valore %2===0){
						alert("pari");
						document.body.innerHTML += "<p>il valore è: pari </p>";
					}
					else{
						alert("dispari");
						document.body.innerHTML += "<p>il valore è: dispari </p>";
					}
				}
			</script>
		</head>
		<body>
			<h2>Somma di due numeri</h2><br>
			<input type="number" id="num1" placeholder="primo numero" name="num1"> +</input>
			<input type="number" id="num2" placeholder="secondo numero" name="num2"></input><br><br>
			<input type="button" value="Calcola Somma" onclick="calcolasum();"><br><br>
			<div id="myDiv">
				Risultato: <span id="risultato">0</span>
			</div><br>
			
			<h3>la somma è pari o dispari?<br>pari--> Rosa<br>dispari--> Viola</h3>

			<input type="button" value="Mostra" onclick="check();"><br><br>
			
			<input type="button" onclick="mostraAllert();" value="il risultato è pari o dispari?"></input>
		</body>
	</html>
