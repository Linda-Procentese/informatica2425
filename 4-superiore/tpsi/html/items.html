<!DOCTYPE html>
<html>
		<head>
			<title>Esempio align-item</title>
			<style>
				.container{
					display:flex;<!--attributo-->
					border:2px solid #333;
					height:100px;
					justify-content:center;<!--allineamento giustificato-->
					align-items:center;
				}
				.box{
					height: 50px;
					width: 100px;
					background: pink;
				}
			</style>
		</head>
		
		<body>
			<div class="container">
				<div class="box"></div>
			</div>
		</body>
</html>
